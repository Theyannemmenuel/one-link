    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const SIZE = 14;
        let cols, drops, speeds;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            cols = Math.floor(canvas.width / SIZE);
            drops = Array.from({ length: cols }, () => Math.random() * -(canvas.height / SIZE) * 2);
            speeds = Array.from({ length: cols }, () => Math.random() * 0.35 + 0.15);
        }

        let last = 0;
        function draw(ts) {
            requestAnimationFrame(draw);
            if (ts - last < 40) return;
            last = ts;

            ctx.fillStyle = 'rgba(0,0,0,0.06)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `${SIZE}px monospace`;

            for (let i = 0; i < cols; i++) {
                const y = drops[i] * SIZE;
                const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
                const brightness = Math.random() * 0.25 + 0.65;
                ctx.fillStyle = `rgba(255,255,255,${brightness})`;
                ctx.fillText(ch, i * SIZE, y);

                if (y > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i] += speeds[i];
            }
        }

        init();
        requestAnimationFrame(draw);
        window.addEventListener('resize', init);
    </script>
